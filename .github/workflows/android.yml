name: Android Build

on:
  push:
    branches: [ master ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK and CMake
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "ndk;27.0.12077973" "cmake;3.22.1"

      - name: Download and extract game data
        run: |
          curl -L -o galactic.zip "https://cdn.tohoku.ac/sonicgalactic-demo2-patch1-win.zip"
          unzip -o galactic.zip -d galactic_extracted
          mkdir -p Android-Project/app/src/main/assets
          find galactic_extracted -iname "data.hatch"
          find galactic_extracted -iname "data.hatch" -exec cp {} Android-Project/app/src/main/assets/Data.hatch \;
          ls -la Android-Project/app/src/main/assets/

      - name: Make gradlew executable
        run: chmod +x ./Android-Project/gradlew

      - name: Build debug APK
        working-directory: ./Android-Project
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: HatchGameEngine-debug-apk
          path: Android-Project/app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn
