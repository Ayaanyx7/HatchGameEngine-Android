name: Android Build

on:
  workflow_dispatch:

  push:
    paths:
      - 'Android-Project/**'

  pull_request:
    paths:
      - 'Android-Project/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Java 8
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 8

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build Android project
        working-directory: Android-Project
        run: ../gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: hatch-debug-apk
          path: Android-Project/**/build/outputs/apk/**/*.apk
